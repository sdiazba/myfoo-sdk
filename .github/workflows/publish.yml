name: Publish MyFoo SDK

permissions:
  contents: read
  actions: read
  id-token: write  # Required for Trusted Publisher OIDC

# Publish job triggered manually via workflow_dispatch
on:
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      # Checkout the repository to access changelog
      - name: Checkout repository
        uses: actions/checkout@v4

      # Download artifacts from latest run of Build MyFoo SDK workflow
      - name: Download artifacts
        env:
          GH_TOKEN: ${{ github.token }}
        # Use gh to find and download the artifact
        run: |
          mkdir -p dist
          gh run download --name myfoo-sdk-artifacts --dir dist --repo ${{ github.repository }}
      
      # Publish to PyPI via Trusted Publisher (OIDC)
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      # Extract release notes from CHANGELOG.rst
      - name: Extract release notes
        id: release_notes
        shell: python
        run: |
          import re
          import sys
          from pathlib import Path

          # 1. Clean the tag (e.g., "v1.0.0" -> "1.0.0")
          tag = "${{ github.ref_name }}"
          version = tag.lstrip("v")
          
          # 2. Ensure the file exists (Checkout step must run before this!)
          changelog_path = Path("CHANGELOG.rst")
          if not changelog_path.exists():
              print(f"::error::CHANGELOG.rst not found at {changelog_path.absolute()}")
              sys.exit(1)
              
          changelog = changelog_path.read_text()

          # Stops at: the next version header or end of file (\Z)
          pattern = re.compile(
              rf"^{re.escape(version)}\s+-\s+\d{{4}}-\d{{2}}-\d{{2}}\n-+\n(.*?)(?=\n\d+\.\d+\.\d+\s+-\s+\d{{4}}-\d{{2}}-\d{{2}}\n-+|\Z)",
              re.DOTALL | re.MULTILINE
          )

          match = pattern.search(changelog)
          
          if not match:
              print(f"::warning::No matching changelog section found for version {version}")
              notes = "No release notes provided."
          else:
              notes = match.group(1).strip()

          # 4. Write to GitHub Output (Modern syntax)
          with open("${{ github.output }}", "a") as f:
              f.write(f"RELEASE_NOTES<<EOF\n{notes}\nEOF\n")

      # Create GitHub Release
      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          release_name: ${{ github.ref_name }}
          body: ${{ steps.release_notes.outputs.RELEASE_NOTES }}
          draft: false
          prerelease: false
